name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install deps
        run: npm ci

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run release:version
          publish: npm run release:publish
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-extension:
    name: publish extension
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.outputs.published == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Resolve extension release metadata
        run: |
          EXT_VERSION="$(node -p "require('./packages/stego-extension/package.json').version")"
          EXT_TAG="stego-extension-v${EXT_VERSION}"
          echo "EXT_VERSION=$EXT_VERSION" >> "$GITHUB_ENV"
          echo "EXT_TAG=$EXT_TAG" >> "$GITHUB_ENV"

      - name: Validate VS Marketplace token
        run: |
          if [ -z "${{ secrets.VSCE_PAT }}" ]; then
            echo "Missing VSCE_PAT secret."
            exit 1
          fi

      - name: Compile extension
        run: npm run -w packages/stego-extension compile

      - name: Pack local shared tarball for extension
        run: |
          SHARED_TGZ_PATH="$(npm pack ./packages/shared --pack-destination "$RUNNER_TEMP" | tail -n 1)"
          SHARED_TGZ_PATH="$RUNNER_TEMP/$SHARED_TGZ_PATH"
          if [ ! -f "$SHARED_TGZ_PATH" ]; then
            echo "Could not create local shared tarball for extension packaging."
            exit 1
          fi
          echo "SHARED_TGZ_PATH=$SHARED_TGZ_PATH" >> "$GITHUB_ENV"

      - name: Prepare isolated extension package
        run: |
          EXT_PKG_DIR="$RUNNER_TEMP/stego-extension-package"
          rm -rf "$EXT_PKG_DIR"
          mkdir -p "$EXT_PKG_DIR"
          cp -R packages/stego-extension/. "$EXT_PKG_DIR/"
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const pkgPath = path.join(process.env.EXT_PKG_DIR, 'package.json');
          const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
          delete pkg.scripts['vscode:prepublish'];
          pkg.dependencies['@stego-labs/shared'] = `file:${process.env.SHARED_TGZ_PATH}`;
          fs.writeFileSync(pkgPath, `${JSON.stringify(pkg, null, 2)}\n`);
          NODE
          echo "EXT_PKG_DIR=$EXT_PKG_DIR" >> "$GITHUB_ENV"
        env:
          EXT_PKG_DIR: ${{ runner.temp }}/stego-extension-package
          SHARED_TGZ_PATH: ${{ env.SHARED_TGZ_PATH }}

      - name: Install isolated extension deps
        run: |
          cd "$EXT_PKG_DIR"
          npm install
        env:
          EXT_PKG_DIR: ${{ env.EXT_PKG_DIR }}

      - name: Sync compiled extension output
        run: |
          rm -rf "$EXT_PKG_DIR/out"
          mkdir -p "$EXT_PKG_DIR"
          cp -R packages/stego-extension/out "$EXT_PKG_DIR/out"
        env:
          EXT_PKG_DIR: ${{ env.EXT_PKG_DIR }}

      - name: Package extension VSIX
        run: |
          cd "$EXT_PKG_DIR"
          npx @vscode/vsce package
        env:
          EXT_PKG_DIR: ${{ env.EXT_PKG_DIR }}

      - name: Resolve extension VSIX path
        run: |
          EXT_VSIX_PATH="$(ls -1t "$EXT_PKG_DIR"/*.vsix | head -n 1)"
          if [ -z "$EXT_VSIX_PATH" ]; then
            echo "No VSIX found for stego-extension."
            exit 1
          fi
          echo "EXT_VSIX_PATH=$EXT_VSIX_PATH" >> "$GITHUB_ENV"

      - name: Upload extension VSIX to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.EXT_TAG }}
          target_commitish: ${{ github.sha }}
          files: ${{ env.EXT_VSIX_PATH }}

      - name: Publish extension to VS Marketplace
        run: npx @vscode/vsce publish --packagePath "${{ env.EXT_VSIX_PATH }}" -p "${{ secrets.VSCE_PAT }}"
